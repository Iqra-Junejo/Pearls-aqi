name: "Training Pipeline — Runs Every Day"

on:
  schedule:
    - cron: "0 21 * * *"   # 9PM UTC = 2AM PKT
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Train models (Ridge, RF, LightGBM, XGBoost, LSTM)
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          HOPSWORKS_API_KEY:   ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT:   ${{ secrets.HOPSWORKS_PROJECT }}
          CITY:     karachi
          CITY_LAT: "24.8607"
          CITY_LON: "67.0011"
        run: |
          cd backend
          echo "Training started — $(date -u)"
          python src/training_pipeline.py
          echo "✅ Training complete — $(date -u)"

      - name: Show training summary
        run: |
          [ -f backend/models/training_summary.json ] && cat backend/models/training_summary.json || echo "No summary yet"

      - name: Upload models as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aqi-models-${{ github.run_number }}
          path: backend/models/
          retention-days: 30